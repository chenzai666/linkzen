services:
  app:
    image: bats666/linkzen:${TAG:-latest}
    container_name: linkzen
    ports:
      - "${PORT:-13000}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/app/data/linkzen.db
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://localhost:13000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:13000}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-LinkZen}
      SKIP_DB_CHECK: "false"
      SKIP_DB_MIGRATION: "false"
    volumes:
      - linkzen_data:/app/data
    networks:
      - linkzen-network
    restart: unless-stopped

volumes:
  linkzen_data:
    name: linkzen_data
    driver: local

networks:
  linkzen-network:
    driver: bridge
